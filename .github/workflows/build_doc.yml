name: Build Sphinx Documentation

on:
    push:
        branches:
            - update_PR
    pull_request:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Python
              uses: actions/setup-python@v2
              with:
                python-version: '3.x'

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install sphinx
                pip install sphinx_rtd_theme
                pip install myst-parser


            - name: Build documentation
              run: |
                cd docs
                make html

            # Step 7: Configure Git
            - name: Configure Git
              run: |
                git config --global user.name "GitHub Actions"
                git config --global user.email "actions@github.com"

            # Step 8: Add and Commit Changes
            - name: Commit built documentation
              run: |
                git add .
                if git diff-index --quiet HEAD; then
                echo "No changes to commit."
                exit 0
                fi
                git commit -m "Auto-build Sphinx documentation"

            - name: Create Pull Request
              uses: peter-evans/create-pull-request@v6
              with:
                token: ${{ secrets.GITHUB_TOKEN }}
                branch: auto-update-branch
                base: main
                title: "Automated PR - Updates"
                body: "This is an automated PR with updates."
                labels: "automation, update"
                assignees: "ragansu"