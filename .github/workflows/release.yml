name: Publish to TestPyPI

on:
  push:
    tags:
      - "v*.*.*"  # Triggers when you push a tag like v1.0.2
  workflow_dispatch: # Allows you to click "Run workflow" manually in GitHub Actions

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    # This block is CRITICAL for Trusted Publishing (OIDC)
    environment:
      name: testpypi  # MUST match the environment name in your TestPyPI settings
      url: https://test.pypi.org/p/HiggsML

    permissions:
      id-token: write # Required for passwordless upload
      contents: read  # Required for checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
